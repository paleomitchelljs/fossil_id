<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brachiopod Valve Growth Simulator</title>
<!-- Standalone front-end for the shared model in sim3d.js (single source of
     truth for the geometry; the in-app "Build a brachiopod" view uses the
     same module). This page only builds the controls and mounts the model. -->
<style>
  :root{ --bg:#1a1d23; --panel:#23272f; --ink:#e8e6e1; --muted:#9aa0aa;
    --accent:#6fae7a; --line:#363b44; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #app{display:flex;height:100vh;width:100vw}
  #sim{flex:1 1 auto;min-width:0;position:relative;touch-action:none}
  #panel{flex:0 0 320px;background:var(--panel);border-left:1px solid var(--line);
    overflow-y:auto;padding:16px 16px 40px}
  h1{font-size:15px;margin:0 0 2px}
  .sub{font-size:11.5px;color:var(--muted);margin:0 0 14px;line-height:1.45}
  .group{margin:0 0 12px;border:1px solid var(--line);border-radius:8px;padding:0 10px;background:#20242c}
  .group[open] > summary, .group > h2{color:var(--accent)}
  .group summary,.group h2{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
    cursor:pointer;padding:9px 0;margin:0;font-weight:600;list-style:none}
  .group summary::-webkit-details-marker{display:none}
  .group summary::before{content:"\25B8  "}
  .group[open] summary::before{content:"\25BE  "}
  .ctrl{padding:6px 0 9px;border-top:1px solid #2c313a}
  .ctrl .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
  .ctrl .val{color:var(--accent);font-variant-numeric:tabular-nums;font-size:11.5px}
  input[type=range]{width:100%;accent-color:var(--accent);height:4px}
  .regions{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:2px}
  .region{flex:1;text-align:center}
  .region.active{color:var(--accent);font-weight:700}
  .presets{display:flex;flex-wrap:wrap;gap:6px}
  .presets button,#reset{font:inherit;font-size:11.5px;color:var(--ink);background:#2c313a;
    border:1px solid var(--line);border-radius:6px;padding:5px 9px;cursor:pointer}
  .presets button:hover,#reset:hover{border-color:var(--accent)}
  #reset{width:100%;margin-top:8px;padding:7px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;cursor:pointer;margin-top:10px}
  .toggle input{accent-color:var(--accent)}
  .caps{position:absolute;left:8px;bottom:6px;font-size:10px;color:var(--muted);
    background:rgba(0,0,0,.35);padding:2px 7px;border-radius:4px;pointer-events:none}
</style>
</head>
<body>
  <div id="app">
    <div id="sim"><div class="caps">3D (drag to rotate) · Dorsal · Anterior · Side</div></div>
    <div id="panel">
      <h1>Brachiopod Valve Growth</h1>
      <p class="sub">Two valves grown by marginal accretion from a shared hinge to the commissure.
        Pick a representative species or shape your own with the sliders.</p>
      <div class="group"><h2>Representative species</h2><div class="presets" id="presets"></div></div>
      <div id="sliders"></div>
      <div class="group"><h2>Display</h2>
        <label class="toggle"><input type="checkbox" id="spin" checked> Auto-rotate</label>
        <button id="reset">Reset to default</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="sim3d.js?v=20260526h"></script>
  <script>
  const P = Object.assign({}, Sim3D.DEFAULTS);
  const refreshers = [];
  const refreshAll = () => refreshers.forEach(f => f());

  function regionName(def, val){
    if (def.names) return def.names[val] || String(val);
    if (def.regions){ for (const r of def.regions) if (val <= r.to) return r.name;
      return def.regions[def.regions.length-1].name; }
    return null;
  }
  function makeSlider(def){
    const isInt = Sim3D.INT_KEYS.includes(def.key);
    const wrap = document.createElement("div"); wrap.className = "ctrl";
    const lab = document.createElement("label"); lab.className = "lab";
    const nm = document.createElement("span"); nm.textContent = def.label;
    const val = document.createElement("span"); val.className = "val";
    lab.append(nm, val);
    const input = document.createElement("input");
    input.type = "range"; input.min = def.min; input.max = def.max; input.step = def.step;
    const regions = document.createElement("div"); regions.className = "regions";
    const refresh = () => {
      input.value = P[def.key];
      const rn = regionName(def, P[def.key]);
      val.textContent = rn || (isInt ? String(P[def.key]) : (+P[def.key]).toFixed(2));
      regions.textContent = "";
      const names = def.names || (def.regions ? def.regions.map(r => r.name) : []);
      names.forEach(n => { const s = document.createElement("span");
        s.className = "region" + (n === rn ? " active" : ""); s.textContent = n; regions.append(s); });
    };
    input.addEventListener("input", () => {
      P[def.key] = isInt ? parseInt(input.value, 10) : parseFloat(input.value);
      refreshAll(); Sim3D.setParams(P);
    });
    refreshers.push(refresh); refresh();
    wrap.append(lab, input, regions); return wrap;
  }

  // Preset buttons
  const presetBox = document.getElementById("presets");
  Object.keys(Sim3D.PRESETS).forEach(name => {
    const b = document.createElement("button"); b.textContent = name;
    b.onclick = () => { Object.assign(P, Sim3D.DEFAULTS, Sim3D.PRESETS[name]);
      Sim3D.setParams(P); refreshAll(); };
    presetBox.append(b);
  });

  // Slider groups (expandable)
  const sliders = document.getElementById("sliders");
  Sim3D.GROUPS.forEach((g, i) => {
    const d = document.createElement("details"); d.className = "group"; if (i === 0) d.open = true;
    const s = document.createElement("summary"); s.textContent = g.title; d.append(s);
    g.params.forEach(def => d.append(makeSlider(def)));
    sliders.append(d);
  });

  document.getElementById("reset").onclick = () => {
    Object.assign(P, Sim3D.DEFAULTS); Sim3D.setParams(P); refreshAll();
  };
  document.getElementById("spin").addEventListener("change", e => Sim3D.setSpin(e.target.checked));

  Sim3D.mount(document.getElementById("sim"));
  Sim3D.setParams(P);
  </script>
</body>
</html>
